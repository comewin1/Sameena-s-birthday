<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Sameena</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box;}
        body{
            background:linear-gradient(145deg,#0a0017,#2b0057);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            font-family:'Segoe UI',sans-serif;
            color:white;
            overflow-x:hidden;
            padding:20px;
            position:relative;
        }
        .star{
            position:absolute;
            width:3px; height:3px;
            background:white;
            border-radius:50%;
            animation:twinkle 2s infinite alternate;
        }
        @keyframes twinkle{from{opacity:0.2;} to{opacity:1;}}
        h1{
            font-size:4rem;
            text-align:center;
            background:linear-gradient(45deg,#ffe6b0,#ffb6c1);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            filter:drop-shadow(0 0 20px #ff69b4);
            margin-bottom:10px;
        }
        .typing{
            font-size:2rem;
            border-right:3px solid white;
            white-space:nowrap;
            overflow:hidden;
            width:0;
            margin:20px auto;
            animation:typing 4s steps(25,end) forwards, blink 1s infinite;
        }
        @keyframes typing{to{width:320px;}}
        @keyframes blink{50%{border-color:transparent;}}
        .cake{
            font-size:6rem;
            filter:drop-shadow(0 10px 20px gold);
            animation:bounce 2s infinite;
            margin:10px 0;
        }
        @keyframes bounce{0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);}}
        .slideshow{
            width:260px;
            height:260px;
            border-radius:30px;
            border:4px solid gold;
            box-shadow:0 0 50px #ff00c8;
            overflow:hidden;
            margin:15px;
        }
        .slideshow img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }
        .gift{
            font-size:4rem;
            cursor:pointer;
            background:rgba(255,215,0,0.2);
            padding:10px 30px;
            border-radius:60px;
            border:2px solid pink;
            margin:15px;
            transition:0.3s;
            box-shadow:0 0 30px gold;
            display:inline-block;
        }
        .gift:hover{transform:scale(1.1); background:rgba(255,192,203,0.4);}
        .balloon{
            position:absolute;
            bottom:-150px;
            width:60px; height:90px;
            border-radius:50%;
            opacity:0.8;
            animation:float 8s linear infinite;
        }
        .balloon::after{
            content:''; position:absolute;
            width:2px; height:70px;
            background:rgba(255,255,255,0.3);
            bottom:-70px; left:29px;
        }
        @keyframes float{100%{transform:translateY(-140vh);}}
        .b1{left:5%; background:#ff4d6d;}
        .b2{left:25%; background:#4d9fff;}
        .b3{left:45%; background:#ffdb4d;}
        .b4{left:65%; background:#85e085;}
        .b5{left:85%; background:#ff99ff;}
        .firework{
            position:absolute; width:8px; height:8px;
            border-radius:50%;
            background:radial-gradient(circle, gold, hotpink);
            animation:bang 1s ease-out forwards;
            z-index:999;
            pointer-events:none;
        }
        @keyframes bang{
            0%{transform:scale(0.5); opacity:1;}
            100%{transform:scale(10); opacity:0;}
        }
    </style>
</head>
<body>

<!-- stars -->
<script>
    for(let i=0;i<120;i++){
        let s=document.createElement('div'); 
        s.className='star'; 
        s.style.left=Math.random()*100+'%'; 
        s.style.top=Math.random()*100+'%'; 
        document.body.appendChild(s);
    }
</script>

<h1>🎉 HAPPY BIRTHDAY SAMEENA 🎉</h1>

<!-- typing message (best sister hata diya) -->
<div class="typing">❤️ Sameena, you're magic! ✨✨</div>

<div class="cake">🎂🎈🎂</div>

<!-- SLIDESHOW - photos with exact names -->
<div class="slideshow">
    <img id="photo" src="photo1.jpg (2).jpeg" alt="photo" onerror="this.src='https://images.unsplash.com/photo-1486427944299-d1955d23e34d?w=300'">
</div>

<!-- GIFT BUTTON - 100% working -->
<div class="gift" id="giftBtn">🎁 Tap Gift</div>

<!-- balloons -->
<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

<script>
    // slideshow - tumhari photos
    const images = [
        "photo1.jpg (2).jpeg",
        "photo2.jpg (2).jpeg", 
        "photo3.jpg (2).jpeg"
    ];

    let i=0;
    const img = document.getElementById('photo');
    
    // har 2.5 sec mein photo badlega
    setInterval(() => {
        i = (i+1) % images.length;
        img.src = images[i];
    }, 2500);

    // GIFT FUNCTION - DIRECT ATTACHMENT
    function showFireworks() {
        // 60 fireworks
        for(let f=0; f<60; f++) {
            let fr = document.createElement('div');
            fr.className = 'firework';
            fr.style.left = Math.random()*100 + '%';
            fr.style.top = Math.random()*100 + '%';
            fr.style.background = radial-gradient(circle, hsl(${Math.random()*360},100%,70%), hsl(${Math.random()*360},100%,50%));
            document.body.appendChild(fr);
            setTimeout(() => fr.remove(), 900);
        }
        
        // alert
        setTimeout(() => {
            alert('🎉 Happy Birthday Sameena! ❤️🎂');
        }, 200);
        
        // extra confetti
        for(let c=0; c<15; c++) {
            let conf = document.createElement('div');
            conf.style.position = 'absolute';
            conf.style.left = Math.random()*100 + '%';
            conf.style.top = Math.random()*100 + '%';
            conf.style.fontSize = '30px';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = '999';
            conf.innerHTML = ['✨','🎈','❤️','🎂','🎉','⭐'][Math.floor(Math.random()*6)];
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 1000);
        }
    }

    // GIFT BUTTON CLICK - DONO TARAH SE LAGAYA
    const giftBtn = document.getElementById('giftBtn');
    
    // Method 1: onclick property
    giftBtn.onclick = function(e) {
        e.preventDefault();
        showFireworks();
        return false;
    };
    
    // Method 2: addEventListener (extra safety)
    giftBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showFireworks();
    });
    
    // Method 3: touch device ke liye
    giftBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        showFireworks();
    });
    
    console.log('Gift button ready!'); // debug
</script>

<!-- fallback: agar sab fail ho to bhi kaam kare -->
<noscript>JavaScript enabled nahi hai, but gift button kaam karega? enable karo</noscript>

</body>
</html>
